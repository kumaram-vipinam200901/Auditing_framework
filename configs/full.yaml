# Full experiment config — matches the extended experiment in the proposal.
# Tests GPT-2 124M and 355M as risky models; GPT-2-small as safe.
# Uses BookMIA + WikiText-103.  ~15-25 GPU-hours total.

seed: 42

model:
  risky_model: "gpt2-medium"
  safe_model: "gpt2"
  extra_risky_models:
    - "gpt2"           # 124M as risky (for the 124M-vs-small comparison)
    - "EleutherAI/pythia-1.4b"  # if compute allows

dataset:
  name: "bookmia"
  hf_dataset: "swj0419/BookMIA"
  hf_split: "train"
  hf_text_field: "text"
  hf_label_field: "label"
  num_prompts: 100
  max_prompt_tokens: 64
  member_only: true

sampling:
  num_samples: 1000
  batch_size: 128
  temperature: 1.0

search:
  num_rounds: 10
  top_k: 20
  pool_size: 100
  mutations_per_parent: 3
  keep_fraction: 0.5
  mutation_types:
    - "verbatim_instruction"
    - "quote_wrap"
    - "style_tweak"
    - "punctuation_tweak"
    - "crossover"
    - "prefix_instruction"
    - "format_change"
  use_local_paraphrase: false

statistical:
  delta: 0.05
  claimed_K: 1.0

hardware:
  device: "auto"
  mixed_precision: "fp16"
  num_workers: 2
  torch_compile: false
  cache_kv: false

output:
  run_dir: "runs"
  save_prompts: true
  save_jsonl: true
  save_csv: true
  save_summary: true
