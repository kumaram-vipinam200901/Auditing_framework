# Comprehensive experiment config for conference-grade results.
# Uses ALL BookMIA member snippets, large sample counts, many rounds.
# Expected runtime: ~5-10 minutes on CPU.

seed: 42

model:
  risky_model: "gpt2-medium"
  safe_model: "gpt2"

dataset:
  name: "bookmia"
  hf_dataset: "swj0419/BookMIA"
  hf_split: "train"
  hf_text_field: "text"
  hf_label_field: "label"
  num_prompts: 500
  max_prompt_tokens: 128
  member_only: true

sampling:
  num_samples: 2000
  batch_size: 128
  temperature: 1.0

search:
  num_rounds: 10
  top_k: 20
  pool_size: 100
  mutations_per_parent: 3
  keep_fraction: 0.5
  mutation_types:
    - "verbatim_instruction"
    - "quote_wrap"
    - "style_tweak"
    - "punctuation_tweak"
    - "crossover"
    - "prefix_instruction"
    - "format_change"
  use_local_paraphrase: false

statistical:
  delta: 0.05
  claimed_K: 1.0

hardware:
  device: "auto"
  mixed_precision: "none"

output:
  run_dir: "runs"
  save_prompts: true
  save_jsonl: true
  save_csv: true
  save_summary: true
