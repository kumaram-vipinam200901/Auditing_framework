# Fast mode — for quick iteration / smoke testing.
# Very small sample counts and few rounds.

seed: 42

model:
  risky_model: "gpt2-medium"
  safe_model: "gpt2"

dataset:
  name: "bookmia"
  hf_dataset: "swj0419/BookMIA"
  hf_split: "train"
  hf_text_field: "text"
  hf_label_field: "label"
  num_prompts: 5
  max_prompt_tokens: 32
  member_only: true

sampling:
  num_samples: 50
  batch_size: 32
  temperature: 1.0

search:
  num_rounds: 2
  top_k: 3
  pool_size: 10
  mutations_per_parent: 2
  keep_fraction: 0.5
  mutation_types:
    - "verbatim_instruction"
    - "punctuation_tweak"
    - "crossover"
  use_local_paraphrase: false

statistical:
  delta: 0.05
  claimed_K: 1.0

hardware:
  device: "auto"
  mixed_precision: "none"
  num_workers: 0
  torch_compile: false

output:
  run_dir: "runs"
  run_id: "fast_test"
  save_prompts: true
  save_jsonl: true
  save_csv: true
  save_summary: true
